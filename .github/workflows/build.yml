name: Build

on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
    paths:
      - build/package/*
      - build/package/**/*
  pull_request:
    branches:
      - main
    paths:
      - build/package/*
      - build/package/**/*
      - config/*
      - scripts/*
      - scripts/**/*
  workflow_dispatch: {}

env:
  REGISTRY: docker.io/sanselme
  PLATFORMS: linux/amd64,linux/arm64
  BASE_IMAGE: ubuntu:22.04
  BUILD_IMAGE: golang:1.20-alpine3.17
  ALPINE_IMAGE: alpine:3.17

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include:
          - name: sak
            path: build/package/sak
          - name: kubernetes-entrypoint
            path: build/package/kubernetes-entrypoint
          - name: gitea-runner
            path: build/package/gitea-runner
          - name: omada-controller
            path: build/package/omada-controller
          - name: maas-region-controller
            path: build/package/maas/region-controller-focal
          - name: maas-rack-controller
            path: build/package/maas/rack-controller-focal
          - name: maas-sstream-cache
            path: build/package/maas/sstream-cache
            args: SSTREAM_RELEASE=focal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@204a51a57a74d190b284a0ce69b44bc37201f343
        with:
          cosign-release: v1.9.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@4b4e9c3e2d4531116a6f8ba8e71fc6e2cb6e6c8c
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@49ed152c8eca782a232dede0303416e8f356c37b
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c4ee3adeed93b1fa6a762f209fb01608c1a22f1e
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.name }}
          tags: type=sha,format=long
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@c84f38281176d4c9cdb1626ffafcd6b3911b5d94
        with:
          file: ${{ matrix.path }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ env.PLATFORMS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BUILD_IMAGE=${{ env.BUILD_IMAGE }}
            ALPINE_IMAGE=${{ env.ALPINE_IMAGE }}
            ${{ matrix.args }}
      # FIXME: replace with aquasecurity/trivy-action@master when it supports multiple images
      - name: Run Trivy vulnerability scanner
        uses: docker://ghcr.io/aquasecurity/trivy@sha256:d1796f197930d89590b1cbfbbda9f80ae6e878a1cb77dc652b198dba5c17dcdf
        with:
          entrypoint: /bin/sh
          args: -c "trivy image --clear-cache; for img in ${{ env.found_images }}; do trivy image --exit-code 1 --severity CRITICAL --format sarif --output trivy-results.sarif $img; done"
      # FIXME: upload vulnerability results
      # - name: Upload Trivy results
      #   uses: github/codeql-action/upload-sarif@v2
      #   with:
      #     sarif_file: trivy-results.sarif
      # FIXME: run if pull request
      - name: Sign the published Docker image
        # if: ${{ github.event_name != 'pull_request' }}
        env:
          COSIGN_EXPERIMENTAL: "true"
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: cosign sign --key env://COSIGN_PRIVATE_KEY ${TAGS}
      # FIXME: run if pull request
      - name: Create GitHub SBOM
        uses: aquasecurity/trivy-action@master
        # if: ${{ github.event_name != 'pull_request' }}
        with:
          scan-type: fs
          format: github
          output: dependency-results.sbom.json
          image-ref: ${{ steps.meta.outputs.tags }}
          github-pat: ${{ secrets.GITHUB_TOKEN }}
