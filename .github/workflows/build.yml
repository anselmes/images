name: Build

on:
  # schedule:
  #   - cron: '35 21 * * *'
  push:
    branches:
      - main
    tags:
      - v*.*.*
    paths:
      - build/package/*
      - build/package/**/*
  pull_request:
    branches:
      - main
    paths:
      - build/package/*
      - build/package/**/*

env:
  REGISTRY: ""
  PLATFORMS: linux/amd64,linux/arm64
  BASE_IMAGE: ubuntu:20.04

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include:
          - name: omada-controller
            context: build/package/omada-controller
          - name: region-controller
            context: build/package/maas/region-controller
          - name: rack-controller
            context: build/package/maas/rack-controller
          - name: sstream-cache
            context: build/package/maas/sstream-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@204a51a57a74d190b284a0ce69b44bc37201f343
        with:
          cosign-release: v1.9.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@4b4e9c3e2d4531116a6f8ba8e71fc6e2cb6e6c8c
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@49ed152c8eca782a232dede0303416e8f356c37b
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c4ee3adeed93b1fa6a762f209fb01608c1a22f1e
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.name }}
      # TODO: scan Docker image
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@c84f38281176d4c9cdb1626ffafcd6b3911b5d94
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            FROM=${{ env.BASE_IMAGE }}
      # TODO: sign Docker image
      # - name: Sign the published Docker image
      #   if: ${{ github.event_name != 'pull_request' }}
      #   env:
      #     COSIGN_EXPERIMENTAL: "true"
      #     COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      #     COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      #   run: echo "${{ steps.meta.outputs.tags }}" | xargs -I {} cosign sign --key env://COSIGN_PRIVATE_KEY {}@${{ steps.build-and-push.outputs.digest }}
